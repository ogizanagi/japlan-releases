  <line x1="6" y1="15" x2="9" y2="14.5" stroke="#C4A882" stroke-width="0.4"/>
  <line x1="6" y1="20" x2="9" y2="19.5" stroke="#C4A882" stroke-width="0.4"/>
  <line x1="13" y1="10" x2="16" y2="11" stroke="#C4A882" stroke-width="0.4"/>
  <line x1="13" y1="16" x2="16" y2="17" stroke="#C4A882" stroke-width="0.4"/>
